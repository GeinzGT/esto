<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Warung Nusantara</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1A1A2E; --surface: #24243D; --card: #2D2D4A;
      --accent: #FF6B35; --accent2: #FFB347; --cream: #FFF8F0;
      --muted: #9090A8; --text: #F0EEF8; --radius: 14px;
      --green: #34D399; --yellow: #FBBF24; --red: #F87171;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem; background: var(--surface);
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .top-bar h1 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.2rem; font-weight: 800; }
    .top-bar h1 span { color: var(--accent); }
    .tab-bar { display: flex; gap: .5rem; }
    .tab-btn {
      padding: .5rem 1.2rem; border-radius: 50px; border: 1.5px solid rgba(255,255,255,.12);
      background: transparent; color: var(--muted); font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 600; font-size: .85rem; cursor: pointer; transition: all .2s;
    }
    .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .refresh-info { font-size: .75rem; color: var(--muted); }

    .container { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
    .orders-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1rem; }
    .order-card {
      background: var(--card); border-radius: var(--radius); padding: 1.2rem;
      border: 1px solid rgba(255,255,255,.06);
    }
    .order-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: .8rem; }
    .order-id { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: .85rem; color: var(--accent2); }
    .order-time { font-size: .75rem; color: var(--muted); }
    .order-customer { margin-bottom: .8rem; }
    .order-customer strong { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 1rem; color: var(--cream); }
    .order-customer .meta { font-size: .8rem; color: var(--muted); margin-top: .15rem; }
    .order-items { list-style: none; margin-bottom: .8rem; }
    .order-items li {
      display: flex; justify-content: space-between; padding: .35rem 0;
      border-bottom: 1px solid rgba(255,255,255,.04); font-size: .85rem;
    }
    .order-items li:last-child { border-bottom: none; }
    .order-subtotal { display: flex; justify-content: space-between; font-size: .8rem; color: var(--muted); padding-top: .4rem; }
    .order-tax { display: flex; justify-content: space-between; font-size: .8rem; color: var(--muted); }
    .order-total {
      display: flex; justify-content: space-between; font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800; font-size: 1rem; color: var(--cream); padding-top: .4rem;
      border-top: 1px solid rgba(255,255,255,.08);
    }
    .badges { display: flex; gap: .4rem; flex-wrap: wrap; margin-top: .8rem; }
    .badge {
      padding: .25rem .7rem; border-radius: 50px; font-size: .72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .04em;
    }
    .badge-green { background: rgba(52,211,153,.15); color: var(--green); }
    .badge-yellow { background: rgba(251,191,36,.15); color: var(--yellow); }
    .badge-red { background: rgba(248,113,113,.15); color: var(--red); }
    .badge-blue { background: rgba(96,165,250,.15); color: #60A5FA; }

    .action-btns { display: flex; gap: .5rem; margin-top: .8rem; }
    .action-btn {
      flex: 1; padding: .5rem; border-radius: 10px; border: none;
      font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: .78rem;
      cursor: pointer; transition: all .2s;
    }
    .btn-cook { background: rgba(251,191,36,.15); color: var(--yellow); }
    .btn-cook:hover { background: rgba(251,191,36,.3); }
    .btn-done { background: rgba(52,211,153,.15); color: var(--green); }
    .btn-done:hover { background: rgba(52,211,153,.3); }
    .btn-paid { background: rgba(96,165,250,.15); color: #60A5FA; }
    .btn-paid:hover { background: rgba(96,165,250,.3); }

    .empty { text-align: center; padding: 4rem 2rem; color: var(--muted); }
    .empty .icon { font-size: 3rem; margin-bottom: 1rem; }

    .login-overlay {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center; z-index: 9999;
    }
    .login-box {
      background: var(--surface); border-radius: var(--radius); padding: 2.5rem;
      width: 90%; max-width: 380px; text-align: center;
      border: 1px solid rgba(255,255,255,.08);
    }
    .login-box h2 {
      font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800;
      font-size: 1.4rem; margin-bottom: .4rem; color: var(--cream);
    }
    .login-box h2 span { color: var(--accent); }
    .login-box p { font-size: .85rem; color: var(--muted); margin-bottom: 1.5rem; }
    .login-box input {
      width: 100%; padding: .75rem 1rem; border-radius: 10px; border: 1.5px solid rgba(255,255,255,.1);
      background: var(--card); color: var(--text); font-size: .95rem;
      font-family: 'Inter', sans-serif; outline: none; transition: border-color .2s;
    }
    .login-box input:focus { border-color: var(--accent); }
    .login-box input::placeholder { color: var(--muted); }
    .login-box .login-btn {
      width: 100%; margin-top: 1rem; padding: .75rem; border-radius: 10px; border: none;
      background: var(--accent); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700; font-size: .95rem; cursor: pointer; transition: background .2s;
    }
    .login-box .login-btn:hover { background: #e55a28; }
    .login-error {
      color: var(--red); font-size: .8rem; margin-top: .8rem; display: none;
    }

    @media (max-width: 600px) { .top-bar { flex-direction: column; gap: .8rem; } .orders-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>🔒 <span>Dashboard</span> Login</h2>
    <p>Masukkan password untuk mengakses dashboard</p>
    <input type="password" id="loginPassword" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Masuk</button>
    <div class="login-error" id="loginError">Password salah!</div>
  </div>
</div>

<div class="top-bar" style="display:none" id="topBar">
  <h1>📋 Dashboard <span>Warung Nusantara</span></h1>
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="semua" onclick="setTab('semua')">Semua</button>
    <button class="tab-btn" data-tab="kasir" onclick="setTab('kasir')">Kasir</button>
    <button class="tab-btn" data-tab="dapur" onclick="setTab('dapur')">Dapur</button>
  </div>
  <div class="refresh-info">Auto-refresh tiap 5 detik</div>
</div>

<div class="container" style="display:none" id="mainContainer">
  <div class="orders-grid" id="ordersGrid"></div>
</div>

<script>
const DASHBOARD_PASSWORD = 'admin123';

function doLogin() {
  const input = document.getElementById('loginPassword').value;
  if (input === DASHBOARD_PASSWORD) {
    sessionStorage.setItem('dashboard_auth', 'true');
    showDashboard();
  } else {
    const err = document.getElementById('loginError');
    err.style.display = 'block';
    document.getElementById('loginPassword').value = '';
    document.getElementById('loginPassword').focus();
  }
}

function showDashboard() {
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('topBar').style.display = '';
  document.getElementById('mainContainer').style.display = '';
  fetchOrders();
  setInterval(fetchOrders, 5000);
}

if (sessionStorage.getItem('dashboard_auth') === 'true') {
  showDashboard();
}

let orders = [];
let currentTab = 'semua';

function formatRupiah(n) { return 'Rp ' + n.toLocaleString('id-ID'); }

function timeAgo(iso) {
  const diff = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (diff < 60) return diff + ' detik lalu';
  if (diff < 3600) return Math.floor(diff/60) + ' menit lalu';
  return Math.floor(diff/3600) + ' jam lalu';
}

function payBadge(order) {
  if (order.paymentStatus === 'lunas') return '<span class="badge badge-green">Lunas</span>';
  if (order.paymentStatus === 'pending') return '<span class="badge badge-yellow">Pending</span>';
  return '<span class="badge badge-red">Belum Bayar</span>';
}

function methodBadge(order) {
  return order.paymentMethod === 'online'
    ? '<span class="badge badge-blue">Online</span>'
    : '<span class="badge badge-yellow">Kasir</span>';
}

function kitchenBadge(order) {
  if (order.kitchenStatus === 'baru') return '<span class="badge badge-red">Baru</span>';
  if (order.kitchenStatus === 'dimasak') return '<span class="badge badge-yellow">Dimasak</span>';
  return '<span class="badge badge-green">Selesai</span>';
}

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  renderOrders();
}

async function updateOrder(orderId, data) {
  await fetch('/api/orders', {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ orderId, ...data })
  });
  fetchOrders();
}

function renderOrders() {
  const grid = document.getElementById('ordersGrid');
  let filtered = orders;
  if (currentTab === 'kasir') filtered = orders.filter(o => o.paymentStatus !== 'lunas');
  if (currentTab === 'dapur') filtered = orders.filter(o => o.kitchenStatus !== 'selesai');

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty"><div class="icon">📭</div><p>Belum ada pesanan</p></div>';
    return;
  }

  grid.innerHTML = filtered.map(o => {
    let actions = '';
    if (o.kitchenStatus === 'baru')
      actions += `<button class="action-btn btn-cook" onclick="updateOrder('${o.orderId}',{kitchenStatus:'dimasak'})">🔥 Mulai Masak</button>`;
    if (o.kitchenStatus === 'dimasak')
      actions += `<button class="action-btn btn-done" onclick="updateOrder('${o.orderId}',{kitchenStatus:'selesai'})">✅ Selesai Masak</button>`;
    if (o.paymentStatus !== 'lunas')
      actions += `<button class="action-btn btn-paid" onclick="updateOrder('${o.orderId}',{paymentStatus:'lunas'})">💰 Tandai Lunas</button>`;

    return `<div class="order-card">
      <div class="order-header">
        <div class="order-id">${o.orderId}</div>
        <div class="order-time">${timeAgo(o.createdAt)}</div>
      </div>
      <div class="order-customer">
        <strong>${o.customer.name}</strong>
        <div class="meta">Meja ${o.customer.table || '-'} · ${o.customer.phone}</div>
      </div>
      <ul class="order-items">
        ${o.items.map(i => `<li><span>${i.name} x${i.quantity}</span><span>${formatRupiah(i.price * i.quantity)}</span></li>`).join('')}
      </ul>
      <div class="order-subtotal"><span>Subtotal</span><span>${formatRupiah(o.grossAmount - (o.taxAmount || 0))}</span></div>
      <div class="order-tax"><span>PPN 10%</span><span>${formatRupiah(o.taxAmount || 0)}</span></div>
      <div class="order-total"><span>Total</span><span>${formatRupiah(o.grossAmount)}</span></div>
      <div class="badges">${methodBadge(o)} ${payBadge(o)} ${kitchenBadge(o)}</div>
      ${actions ? `<div class="action-btns">${actions}</div>` : ''}
    </div>`;
  }).join('');
}

async function fetchOrders() {
  try {
    const res = await fetch('/api/orders');
    const data = await res.json();
    orders = data.orders || [];
    renderOrders();
  } catch(e) { console.error(e); }
}
</script>
</body>
</html>
